services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    command: >
      --model ${MODEL_ID:-Qwen/Qwen2.5-1.5B-Instruct}
      --host 0.0.0.0
      --port 8000
      --gpu-memory-utilization 0.90
    ports:
      - "8000:8000"
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    ipc: host
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      start_period: 120s
